name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 scripts/ web/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Validate shell scripts
        run: |
          bash -n deploy.sh
          bash -n install.sh
          bash -n scripts/backup.sh
          bash -n scripts/retrain.sh
          bash -n download_dataset.sh

      - name: Test train_model.py import safety
        run: |
          # Este test fallará si train_model.py ejecuta código al importar (bug crítico).
          # Solo necesitamos que el módulo sea importable sin side-effects.
          python -c "
import sys, os
os.chdir('.')
sys.path.insert(0, 'scripts')
import train_model
print('OK: train_model importa sin ejecutar side-effects')
"

      - name: Test predict.py import safety
        run: |
          python -c "
import sys, os
os.chdir('.')
sys.path.insert(0, 'scripts')
import predict
print('OK: predict importa sin ejecutar side-effects')
"
