<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error — Email Malware Detector</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg-body); color:var(--text-primary); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { text-align:center; padding:40px; }
        h1 { font-size:4em; color:var(--danger); }
        p  { color:var(--text-muted); margin:16px 0 24px; }
        a  { color:var(--accent); text-decoration:none; }
    </style>
</head>
<body>
<div class="card">
    <h1>⛔</h1>
    <h2>{{ message }}</h2>
    <p>No tienes permisos para acceder a esta sección.</p>

</div>
<script src="/static/theme.js"></script>
</body>
</html>
