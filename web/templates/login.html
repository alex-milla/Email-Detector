<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Email Malware Detector</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#1e293b; border-radius:16px; padding:40px; width:100%; max-width:400px; border:1px solid #334155; box-shadow:0 25px 50px rgba(0,0,0,0.5); }
        .logo { text-align:center; margin-bottom:32px; }
        .logo h1 { font-size:1.6em; }
        .logo h1 span { color:#3b82f6; }
        .logo p { color:#64748b; margin-top:6px; font-size:0.9em; }
        .form-group { margin-bottom:20px; }
        label { display:block; color:#94a3b8; font-size:0.85em; margin-bottom:6px; font-weight:500; }
        input[type=text], input[type=password] {
            width:100%; padding:12px 16px; background:#0f172a; border:1px solid #334155;
            border-radius:8px; color:#e2e8f0; font-size:1em; transition:border-color 0.2s;
        }
        input:focus { outline:none; border-color:#3b82f6; }
        .btn { width:100%; padding:13px; background:#3b82f6; color:white; border:none; border-radius:8px; font-size:1em; font-weight:600; cursor:pointer; transition:background 0.2s; margin-top:8px; }
        .btn:hover { background:#2563eb; }
        .error { background:rgba(239,68,68,0.1); border:1px solid #ef4444; border-radius:8px; padding:12px 16px; color:#fca5a5; font-size:0.9em; margin-bottom:20px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>🛡️ Email <span>Malware</span> Detector</h1>
        <p>Inicia sesión para continuar</p>
    </div>
    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" name="username" autocomplete="username" autofocus required>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">Entrar</button>
    </form>
</div>
</body>
</html>
